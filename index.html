<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script
      src="https://kit.fontawesome.com/cbbc16a0dd.js"
      crossorigin="anonymous"
    ></script>
    <link rel="stylesheet" href="styles/index.css" />
    <link rel="stylesheet" href="styles/normalize.css" />
    <title>Image Slider</title>
  </head>
  <body>
    <div class="container">
      <div class="slide">
        <div class="item" style="background-image: url(./images/sweden.jpg)">
          <div class="content">
            <div class="name">Sweden</div>
            <div class="des">some lorem ipsum!</div>
            <button>See More</button>
          </div>
        </div>
        <div class="item" style="background-image: url(./images/norway.jpg)">
          <div class="content">
            <div class="name">Norway</div>
            <div class="des">some lorem ipsum!</div>
            <button>See More</button>
          </div>
        </div>
        <div class="item" style="background-image: url(./images/denmark.jpg)">
          <div class="content">
            <div class="name">Denmark</div>
            <div class="des">some lorem ipsum!</div>
            <button>See More</button>
          </div>
        </div>
        <div class="item" style="background-image: url(./images/finland.jpg)">
          <div class="content">
            <div class="name">finland</div>
            <div class="des">some lorem ipsum!</div>
            <button>See More</button>
          </div>
        </div>
        <div class="item" style="background-image: url(./images/iceland.jpg)">
          <div class="content">
            <div class="name">iceland</div>
            <div class="des">some lorem ipsum!</div>
            <button>See More</button>
          </div>
        </div>
      </div>
      <div class="button">
        <button class="prev"><i class="fa-solid fa-arrow-left"></i></button>
        <button class="next"><i class="fa-solid fa-arrow-right"></i></button>
      </div>
    </div>
    <script src="script/index.js"></script>
  </body>
</html>
